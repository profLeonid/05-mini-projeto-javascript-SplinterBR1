<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contador</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Contador</h1>
    <p>Informe o início, fim e o salto para gerar a contagem.</p>

    <div class="campo">
      <label>Início</label>
      <input type="number" id="num-inicio" placeholder="Ex: 1"/>
    </div>

    <div class="campo">
      <label>Fim</label>
      <input type="number" id="num-fim" placeholder="Ex: 20"/>
    </div>

    <div class="campo">
      <label>Salto</label>
      <input type="number" id="intervalo" placeholder="Ex: 2"/>
    </div>

    <button onclick="contador()">Gerar Contagem</button>
    <button onclick="limpar()">Limpar</button>

    <div class="resultado">
      <p class="resultado-titulo" id="resultado"></p>
      <ul id="lista">
      </ul>
    </div>

  </div>

</body>
<script src="main.js" defer></script>
</html>

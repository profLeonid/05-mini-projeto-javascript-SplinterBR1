<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabuada</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Tabuada</h1>
    <p>Informe um número para gerar sua tabuada completa.</p>

    <div class="campo">
      <label>Número</label>
      <input type="number" id="entrada" placeholder="Ex: 7" />
    </div>
    <div class="campo">
      <label>Multiplicador</label>
      <input type="number" id="multiplicador" placeholder="Ex: 10, 20, 30" />
    </div>

    <button onclick="tabuada()">Gerar Tabuada</button>
    <button onclick="limpar()">Limpar</button>

    <div class="resultado">
      <p class="resultado-titulo" id="retorno">Tabuada</p>
      <table>
        <thead>
          <tr>
            <th>Expressão</th>
            <th>Resultado</th>
          </tr>
        </thead>
        <tbody id="tabela">

        </tbody>
      </table>
    </div>

  </div>

</body>
<script src="main.js" defer></script>


</html>
